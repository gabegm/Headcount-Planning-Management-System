services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gatekeeping
      POSTGRES_USER: gatekeeping
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gatekeeping}
    ports:
      - "5432:5432"
    volumes:
      - gatekeeping-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatekeeping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: gatekeeping
      DB_USER: gatekeeping
      DB_PASSWORD: ${DB_PASSWORD:-gatekeeping}
      MAIL_USERNAME: ${MAIL_USERNAME:-hrgatekeeping@gaucimaistre.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SSL_ENABLED: ${SSL_ENABLED:-false}
      SSL_KEYSTORE: ${SSL_KEYSTORE:-}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    depends_on:
      db:
        condition: service_healthy

volumes:
  gatekeeping-db: