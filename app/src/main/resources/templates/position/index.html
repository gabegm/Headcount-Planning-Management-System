<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>Positions</title>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Positions</h1>
        <div class="btn-toolbar mb-2 mb-md-0" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/positions/create}" class="btn btn-outline-primary">
                <i class="bi bi-plus-square me-1"></i> New
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table id="positionsTable" class="table table-striped table-bordered hover w-100">
            <thead>
                <tr>
                    <th scope="col">Actions</th>
                    <th scope="col">Status</th>
                    <th scope="col">Recruitment Status</th>
                    <th scope="col">Number</th>
                    <th scope="col">Pillar</th>
                    <th scope="col">Company</th>
                    <th scope="col">Department</th>
                    <th scope="col">Function</th>
                    <th scope="col">Title</th>
                    <th scope="col">Functional Reporting Line</th>
                    <th scope="col">Disciplinary Reporting Line</th>
                    <th scope="col">Holder</th>
                    <th scope="col">Hours</th>
                    <th scope="col">Start Date</th>
                    <th scope="col">End Date</th>
                    <th scope="col">Salary</th>
                    <th scope="col">Social Security</th>
                    <th scope="col">Fringe Benefit</th>
                    <th scope="col">Performance Bonus</th>
                    <th scope="col">Super Bonus</th>
                    <th scope="col">Management Bonus</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="position : ${positions}">
                    <td>
                        <button type="button"
                                class="btn btn-sm btn-outline-primary"
                                data-bs-toggle="modal"
                                data-bs-target="#positionModal"
                                th:attr="hx-get=@{/positions/{number}/details(number=${position.number})},hx-target='#positionModal .modal-body',hx-swap='innerHTML'">
                            <i class="bi bi-eye me-1"></i> View
                        </button>
                    </td>
                    <td th:text="${position.statusName}"></td>
                    <td th:text="${position.recruitmentStatusName}"></td>
                    <td th:text="${position.number}"></td>
                    <td th:text="${position.pillarName}"></td>
                    <td th:text="${position.companyName}"></td>
                    <td th:text="${position.departmentName}"></td>
                    <td th:text="${position.functionName}"></td>
                    <td th:text="${position.title}"></td>
                    <td th:text="${position.functionalReportingLine}"></td>
                    <td th:text="${position.disciplinaryReportingLine}"></td>
                    <td th:text="${position.holder}"></td>
                    <td th:text="${position.hours}"></td>
                    <td th:text="${position.startDate}"></td>
                    <td th:text="${position.endDate}"></td>
                    <td th:text="${'€' + #numbers.formatDecimal(position.salary, 1, 2)}"></td>
                    <td th:text="${'€' + #numbers.formatDecimal(position.socialSecurityContribution, 1, 2)}"></td>
                    <td th:text="${'€' + #numbers.formatDecimal(position.fringeBenefit, 1, 2)}"></td>
                    <td th:text="${position.performanceBonus + '%'}"></td>
                    <td th:text="${position.superBonus + '%'}"></td>
                    <td th:text="${'€' + position.managementBonus}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Position Detail Modal -->
    <div class="modal fade" id="positionModal" tabindex="-1"
         aria-labelledby="positionModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="positionModalLabel">
                        <i class="bi bi-person-badge me-2"></i>Position Details
                    </h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center text-muted py-4">
                        <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
                        Loading…
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

</th:block>

<th:block layout:fragment="scripts-extra">
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            new DataTable('#positionsTable', {
                ...window.defaultDataTableConfig,
                scrollX: true
            });

            // Trigger htmx request when the modal is about to show
            document.getElementById('positionModal').addEventListener('show.bs.modal', function (event) {
                const trigger = event.relatedTarget;
                if (trigger) {
                    htmx.process(trigger);
                    htmx.trigger(trigger, 'click');
                }
            });

            // Reset modal body on hide so stale content is cleared
            document.getElementById('positionModal').addEventListener('hidden.bs.modal', function () {
                this.querySelector('.modal-body').innerHTML =
                    '<div class="text-center text-muted py-4">' +
                    '<div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>' +
                    'Loading\u2026</div>';
            });
        });
    </script>
</th:block>
</body>
</html>
