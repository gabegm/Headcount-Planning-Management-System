<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>Home</title>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Establishment</h1>
    </div>

    <div th:if="${functions == null or #lists.isEmpty(functions)}"
         class="alert alert-info" role="alert">
        <i class="bi bi-info-circle me-1"></i>
        You are not assigned to any functions yet.
    </div>

    <div th:unless="${functions == null or #lists.isEmpty(functions)}"
         class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="function : ${functions}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">
                        <i class="bi bi-diagram-3 me-2 text-primary"></i>
                        <span th:text="${function.name}">Function Name</span>
                    </h5>
                    <p class="card-text text-muted flex-grow-1"
                       th:text="${function.description}"
                       th:if="${function.description != null}"></p>
                    <a th:href="@{/positions(functionId=${function.id})}"
                       class="btn btn-outline-primary mt-3 align-self-start">
                        <i class="bi bi-person-badge me-1"></i> View Positions
                    </a>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
