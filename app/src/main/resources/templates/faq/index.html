<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title>FAQ</title>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">FAQ</h1>
        <div class="btn-toolbar mb-2 mb-md-0" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/faq}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-pencil-square me-1"></i> Edit
            </a>
        </div>
    </div>

    <div class="container">
        <div class="py-4">
            <div th:if="${#lists.isEmpty(faqs)}" class="text-center text-muted py-5">
                <i class="bi bi-question-circle fs-1 d-block mb-3"></i>
                <p>No FAQ content has been added yet.</p>
                <a th:href="@{/admin/faq}" sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-primary">
                    Add FAQ content
                </a>
            </div>
            <div th:each="faq : ${faqs}" class="mb-5">
                <h3 class="mb-3" th:text="${faq.title}"></h3>
                <div th:utext="${faq.body}"></div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
