<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head>
    <title layout:fragment="page-title">Submissions</title>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Submissions</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a th:href="@{/submissions/create}" class="btn btn-sm btn-primary">
                <i class="bi bi-plus-lg me-1"></i>New Submission
            </a>
        </div>
    </div>

    <div class="table-responsive">
        <table id="submissionsTable" class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th scope="col">Submitted</th>
                    <th scope="col">Position ID</th>
                    <th scope="col">Effective Date</th>
                    <th scope="col">Reason</th>
                    <th scope="col">Status</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${submissions}">
                    <td th:text="${#temporals.format(s.submitted, 'dd MMM yyyy HH:mm')}">—</td>
                    <td>
                        <span class="fw-semibold" th:text="${s.positionId}">—</span>
                    </td>
                    <td th:text="${#temporals.format(s.effectiveDate, 'dd MMM yyyy')}">—</td>
                    <td th:text="${s.reasonName}">—</td>
                    <td>
                        <span class="badge"
                              th:classappend="${s.statusId == 2} ? 'bg-success' : (${s.statusId == 3} ? 'bg-danger' : 'bg-warning text-dark')"
                              th:text="${s.statusName}">
                            On Hold
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/submissions/{id}/change(id=${s.id})}"
                           class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-eye me-1"></i>View Changes
                        </a>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</th:block>

<th:block layout:fragment="scripts-extra">
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            new DataTable('#submissionsTable', Object.assign({}, window.defaultDataTableConfig, {
                language: {
                    emptyTable: 'No submissions found. <a href="/submissions/create">Create one?</a>'
                },
                columnDefs: [{ orderable: false, targets: -1 }]
            }));
        });
    </script>
</th:block>
</body>
</html>
