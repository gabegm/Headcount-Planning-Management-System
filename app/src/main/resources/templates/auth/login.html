<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head><title>Sign In</title></head>
<body>
<th:block layout:fragment="content">
    <h1 class="h3 mb-3 fw-normal">Sign in</h1>
    <div th:if="${errorMessage}" class="alert alert-warning alert-dismissible fade show text-start" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show text-start" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autofocus/>
            <label for="email">Email address</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required/>
            <label for="password">Password</label>
        </div>
        <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Sign in</button>
        <div class="d-flex justify-content-between">
            <a th:href="@{/auth/register}">Create an account</a>
            <a th:href="@{/auth/forgot-password}">Forgot password?</a>
        </div>
    </form>
</th:block>
</body>
</html>
