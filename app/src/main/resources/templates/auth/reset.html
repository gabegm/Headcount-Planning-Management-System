<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head><title>Reset Password</title></head>
<body>
<th:block layout:fragment="content">
    <h1 class="h3 mb-3 fw-normal">Reset password</h1>
    <div th:if="${errorMessage}" class="alert alert-warning alert-dismissible fade show text-start" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <form th:action="@{/auth/reset/{token}(token=${token})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="New password" required minlength="8" maxlength="20" autofocus/>
            <label for="password">New password</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                   placeholder="Confirm password" required minlength="8" maxlength="20"/>
            <label for="confirmPassword">Confirm password</label>
        </div>
        <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Set new password</button>
    </form>
</th:block>
</body>
</html>
