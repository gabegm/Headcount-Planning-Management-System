<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Users</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Users</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg"></i> New User
        </button>
    </div>

    <div class="table-responsive">
        <table id="usersTable" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.email}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${user.role}"></span>
                    </td>
                    <td>
                        <span th:if="${user.active}" class="badge bg-success">Yes</span>
                        <span th:unless="${user.active}" class="badge bg-danger">No</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1"
                                th:attr="hx-get=@{/admin/users/{id}/edit-form(id=${user.id})}"
                                hx-target="#editModalBody"
                                hx-on::after-request="bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal')).show()">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form method="post"
                              th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                              class="d-inline"
                              onsubmit="return confirm('Delete this user?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1" aria-labelledby="createModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createModalLabel">New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" th:action="@{/admin/users}">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required/>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required/>
                        </div>
                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="USER">USER</option>
                                <option value="ADMIN">ADMIN</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="active" class="form-label">Active</label>
                            <select class="form-select" id="active" name="active">
                                <option value="true">Yes</option>
                                <option value="false">No</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal (populated via htmx) -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="editModalBody">
                    <!-- Loaded via htmx -->
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        new DataTable('#usersTable', window.defaultDataTableConfig);
    </script>
</th:block>

<div th:fragment="editForm">
    <form method="post" th:action="@{/admin/users/{id}/update(id=${user.id})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label for="editEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail" name="email"
                   th:value="${user.email}" readonly/>
        </div>
        <div class="mb-3">
            <label for="editType" class="form-label">Role</label>
            <select class="form-select" id="editType" name="type" required>
                <option value="USER" th:selected="${user.type.name() == 'USER'}">USER</option>
                <option value="ADMIN" th:selected="${user.type.name() == 'ADMIN'}">ADMIN</option>
            </select>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="editActive" name="active"
                   value="true" th:checked="${user.active}"/>
            <label class="form-check-label" for="editActive">Active</label>
        </div>
        <div class="mb-3" th:if="${not #lists.isEmpty(functions)}">
            <label class="form-label">Functions</label>
            <div th:each="func : ${functions}" class="form-check">
                <input type="checkbox" class="form-check-input"
                       th:id="'editFunc-' + ${func.id}"
                       name="functionIds"
                       th:value="${func.id}"
                       th:checked="${userFunctions != null and #lists.contains(userFunctions, func.id)}"/>
                <label class="form-check-label" th:for="'editFunc-' + ${func.id}"
                       th:text="${func.name}"></label>
            </div>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
    </form>
</div>

</body>
</html>
