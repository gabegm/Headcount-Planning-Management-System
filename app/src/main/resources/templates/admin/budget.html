<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Budget</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Budget</h1>
        <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#uploadModal">
            <i class="bi bi-upload"></i> Upload
        </button>
    </div>

    <div class="table-responsive">
        <table id="budgetTable" class="table table-striped table-bordered table-sm">
            <thead>
                <tr>
                    <th>Status</th>
                    <th>Recruitment Status</th>
                    <th>Number</th>
                    <th>Pillar</th>
                    <th>Company</th>
                    <th>Department</th>
                    <th>Function</th>
                    <th>Title</th>
                    <th>Functional Reporting Line</th>
                    <th>Disciplinary Reporting Line</th>
                    <th>Holder</th>
                    <th>Hours</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Salary</th>
                    <th>Fringe Benefit</th>
                    <th>Performance Bonus</th>
                    <th>Super Bonus</th>
                    <th>Management Bonus</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pos : ${positions}">
                    <td>
                        <span class="badge bg-primary" th:text="${pos.statusName}"></span>
                    </td>
                    <td th:text="${pos.recruitmentStatusName}"></td>
                    <td th:text="${pos.number}"></td>
                    <td th:text="${pos.pillarName}"></td>
                    <td th:text="${pos.companyName}"></td>
                    <td th:text="${pos.departmentName}"></td>
                    <td th:text="${pos.functionName}"></td>
                    <td th:text="${pos.title}"></td>
                    <td th:text="${pos.functionalReportingLine}"></td>
                    <td th:text="${pos.disciplinaryReportingLine}"></td>
                    <td th:text="${pos.holder}"></td>
                    <td th:text="${pos.hours}"></td>
                    <td th:text="${pos.startDate}"></td>
                    <td th:text="${pos.endDate}"></td>
                    <td th:text="${'€' + #numbers.formatDecimal(pos.salary, 1, 2)}"></td>
                    <td th:text="${'€' + pos.fringeBenefit}"></td>
                    <td th:text="${pos.performanceBonus + '%'}"></td>
                    <td th:text="${pos.superBonus + '%'}"></td>
                    <td th:text="${'€' + pos.managementBonus}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="uploadModalLabel">Upload Budget</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" enctype="multipart/form-data" th:action="@{/admin/budget/upload}">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="file" class="form-label">File</label>
                            <input type="file" class="form-control" id="file" name="file" accept=".csv,.xlsx,.xls" required/>
                        </div>
                        <div class="mb-3">
                            <label for="importType" class="form-label">Import Type</label>
                            <select class="form-select" id="importType" name="importType">
                                <option value="INSERT">Insert</option>
                                <option value="UPDATE">Update</option>
                                <option value="UPSERT">Upsert</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="delimiter" class="form-label">Delimiter</label>
                            <select class="form-select" id="delimiter" name="delimiter">
                                <option value=",">Comma</option>
                                <option value="&#9;">Tab</option>
                                <option value="|">Pipe</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="dateFormat" class="form-label">Date Format</label>
                            <select class="form-select" id="dateFormat" name="dateFormat">
                                <option value="dd/MM/yyyy">dd/MM/yyyy</option>
                                <option value="MM/dd/yyyy">MM/dd/yyyy</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        new DataTable('#budgetTable', {
            ...window.defaultDataTableConfig,
            scrollX: true
        });
    </script>
</th:block>

</body>
</html>
