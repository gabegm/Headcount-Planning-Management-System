<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Submissions</title>
</head>
<body>

<div layout:fragment="content">
    <div class="pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Submissions</h1>
    </div>

    <div class="table-responsive">
        <table id="submissionsTable" class="table table-striped table-bordered table-sm">
            <thead>
                <tr>
                    <th>Submitted</th>
                    <th>Submitter</th>
                    <th>Position</th>
                    <th>Effective Date</th>
                    <th>Gatekeeping</th>
                    <th>Status</th>
                    <th>Reason</th>
                    <th>Rationale</th>
                    <th>Changes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="sub : ${submissions}">
                    <td th:text="${sub.submitted}"></td>
                    <td th:text="${sub.submitter}"></td>
                    <td>
                        <a th:href="@{/admin/positions/{id}(id=${sub.positionId})}"
                           th:text="${sub.positionId}"></a>
                    </td>
                    <td th:text="${sub.effectiveDate}"></td>
                    <td th:text="${sub.gatekeepingDate}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${sub.status}"></span>
                    </td>
                    <td th:text="${sub.reason}"></td>
                    <td th:text="${sub.rationale}"></td>
                    <td>
                        <a th:href="@{/admin/submission-changes(submissionId=${sub.id})}"
                           th:text="${sub.changeCount + ' Change(s)'}"></a>
                    </td>
                    <td class="text-nowrap">
                        <button class="btn btn-sm btn-outline-primary me-1"
                                th:attr="hx-get=@{/admin/submissions/{id}/edit-form(id=${sub.id})}"
                                hx-target="#editModalBody"
                                hx-on::after-request="bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal')).show()">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form method="post"
                              th:action="@{/admin/submissions/{id}/delete(id=${sub.id})}"
                              class="d-inline"
                              onsubmit="return confirm('Delete this submission?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Edit Modal (populated via htmx) -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Submission</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="editModalBody">
                    <!-- Loaded via htmx -->
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        new DataTable('#submissionsTable', {
            ...window.defaultDataTableConfig,
            scrollX: true
        });
    </script>
</th:block>

<div th:fragment="editForm">
    <form method="post" th:action="@{/admin/submissions/{id}/update(id=${submission.id})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label for="editStatusId" class="form-label">Status</label>
            <select class="form-select" id="editStatusId" name="statusId" required>
                <option th:each="s : ${statuses}"
                        th:value="${s.id}"
                        th:text="${s.name}"
                        th:selected="${s.id == submission.statusId}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="editComment" class="form-label">Comment</label>
            <textarea class="form-control" id="editComment" name="comment" rows="4"
                      th:text="${submission.comment}"></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
    </form>
</div>

</body>
</html>
