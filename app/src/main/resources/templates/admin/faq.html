<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>FAQ</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">FAQ</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg"></i> New FAQ
        </button>
    </div>

    <div class="table-responsive">
        <table id="faqTable" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Submitted</th>
                    <th>Edited</th>
                    <th>Question</th>
                    <th>Answer</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="faq : ${faqs}">
                    <td th:text="${faq.submitted}"></td>
                    <td th:text="${faq.edited}"></td>
                    <td th:text="${faq.title}"></td>
                    <td th:utext="${faq.body}"></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1"
                                th:attr="hx-get=@{/admin/faq/{id}/edit-form(id=${faq.id})}"
                                hx-target="#editModalBody"
                                hx-on::after-request="bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal')).show()">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form method="post"
                              th:action="@{/admin/faq/{id}/delete(id=${faq.id})}"
                              class="d-inline"
                              onsubmit="return confirm('Delete this FAQ entry?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1" aria-labelledby="createModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createModalLabel">New FAQ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" th:action="@{/admin/faq}" id="createFaqForm">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="title" class="form-label">Question</label>
                            <input type="text" class="form-control" id="title" name="title" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Answer</label>
                            <div id="createEditor"></div>
                            <input type="hidden" name="body" id="createBodyInput"/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal (populated via htmx) -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit FAQ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="editModalBody">
                    <!-- Loaded via htmx -->
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        new DataTable('#faqTable', window.defaultDataTableConfig);

        const createQuill = new Quill('#createEditor', { theme: 'snow' });
        document.getElementById('createFaqForm').addEventListener('submit', function () {
            document.getElementById('createBodyInput').value = createQuill.getSemanticHTML();
        });
    </script>
</th:block>

</body>
</html>
