<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Audit Trail</title>
</head>
<body>

<div layout:fragment="content">
    <div class="pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Audit Trail</h1>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-4">
            <label for="dateFrom" class="form-label">From</label>
            <input type="date" class="form-control" id="dateFrom"/>
        </div>
        <div class="col-md-4">
            <label for="dateTo" class="form-label">To</label>
            <input type="date" class="form-control" id="dateTo"/>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button type="button" class="btn btn-outline-secondary" id="clearDateFilter">
                <i class="bi bi-x-circle"></i> Clear Filter
            </button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="auditTable" class="table table-striped table-bordered table-sm">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>User Agent</th>
                    <th>IP Address</th>
                    <th>Domain</th>
                    <th>User</th>
                    <th>Table</th>
                    <th>Row ID</th>
                    <th>Function</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.date}"></td>
                    <td th:text="${log.userAgent}"></td>
                    <td th:text="${log.ipAddress}"></td>
                    <td th:text="${log.domain}"></td>
                    <td th:text="${log.userId}"></td>
                    <td th:text="${log.tableName}"></td>
                    <td th:text="${log.rowId}"></td>
                    <td th:text="${log.function}"></td>
                    <td th:text="${log.action}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        const auditTable = new DataTable('#auditTable', {
            ...window.defaultDataTableConfig,
            scrollX: true,
            order: [[0, 'desc']]
        });

        document.getElementById('dateFrom').addEventListener('change', applyDateFilter);
        document.getElementById('dateTo').addEventListener('change', applyDateFilter);
        document.getElementById('clearDateFilter').addEventListener('click', function () {
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            auditTable.search('').columns().search('').draw();
        });

        function applyDateFilter() {
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            DataTable.ext.search = DataTable.ext.search.filter(fn => fn.name !== 'auditDateFilter');
            DataTable.ext.search.push(function auditDateFilter(settings, data) {
                if (settings.nTable.id !== 'auditTable') return true;
                const rowDate = data[0];
                if (!rowDate) return true;
                if (from && rowDate < from) return false;
                if (to && rowDate > to) return false;
                return true;
            });
            auditTable.draw();
        }
    </script>
</th:block>

</body>
</html>
