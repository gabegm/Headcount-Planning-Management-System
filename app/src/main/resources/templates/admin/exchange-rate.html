<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Exchange Rates</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Exchange Rates</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg"></i> New Rate
        </button>
    </div>

    <div class="table-responsive">
        <table id="exchangeRatesTable" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Rate (to EUR)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="rate : ${rates}">
                    <td th:text="${rate.name}"></td>
                    <td th:text="${rate.code}"></td>
                    <td th:text="${rate.rate}"></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1"
                                th:attr="hx-get=@{/admin/exchange-rates/{id}/edit-form(id=${rate.id})}"
                                hx-target="#editModalBody"
                                hx-on::after-request="bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal')).show()">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form method="post"
                              th:action="@{/admin/exchange-rates/{id}/delete(id=${rate.id})}"
                              class="d-inline"
                              onsubmit="return confirm('Delete this exchange rate?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1" aria-labelledby="createModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createModalLabel">New Exchange Rate</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" th:action="@{/admin/exchange-rates}">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="e.g. US Dollar" required/>
                        </div>
                        <div class="mb-3">
                            <label for="code" class="form-label">Code</label>
                            <input type="text" class="form-control" id="code" name="code"
                                   placeholder="e.g. USD" maxlength="3" required/>
                        </div>
                        <div class="mb-3">
                            <label for="rate" class="form-label">Rate (to EUR)</label>
                            <input type="number" step="0.000001" min="0" class="form-control"
                                   id="rate" name="rate" required/>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal (populated via htmx) -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Exchange Rate</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="editModalBody">
                    <!-- Loaded via htmx -->
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        new DataTable('#exchangeRatesTable', window.defaultDataTableConfig);
    </script>
</th:block>

<div th:fragment="editForm">
    <form method="post" th:action="@{/admin/exchange-rates/{id}/update(id=${exchangeRate.id})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label for="editName" class="form-label">Name</label>
            <input type="text" class="form-control" id="editName" name="name"
                   th:value="${exchangeRate.name}" required/>
        </div>
        <div class="mb-3">
            <label for="editCode" class="form-label">Code</label>
            <input type="text" class="form-control" id="editCode" name="code"
                   th:value="${exchangeRate.code}" maxlength="10" required/>
        </div>
        <div class="mb-3">
            <label for="editRate" class="form-label">Rate (to EUR)</label>
            <input type="number" step="0.0001" min="0" class="form-control" id="editRate" name="rate"
                   th:value="${exchangeRate.rate}" required/>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
    </form>
</div>

</body>
</html>
