<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin}">
<head>
    <title>Gatekeeping</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Gatekeeping Sessions</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg"></i> New Cycle
        </button>
    </div>

    <div class="table-responsive">
        <table id="gatekeepingTable" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Submission Deadline</th>
                    <th>Notes</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="gk : ${gatekeepings}">
                    <td th:text="${gk.date}"></td>
                    <td th:text="${gk.submissionDeadline}"></td>
                    <td th:text="${gk.notes}"></td>
                    <td>
                        <span th:if="${gk.open}" class="badge bg-success">Open</span>
                        <span th:unless="${gk.open}" class="badge bg-danger">Closed</span>
                    </td>
                    <td class="text-nowrap">
                        <button class="btn btn-sm btn-outline-primary me-1"
                                th:attr="hx-get=@{/admin/gatekeeping/{id}/edit-form(id=${gk.id})}"
                                hx-target="#editModalBody"
                                hx-on::after-request="bootstrap.Modal.getOrCreateInstance(document.getElementById('editModal')).show()">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <form method="post"
                              th:action="@{/admin/gatekeeping/{id}/close(id=${gk.id})}"
                              class="d-inline"
                              th:if="${gk.open}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-warning me-1"
                                    title="Close cycle">
                                <i class="bi bi-lock"></i>
                            </button>
                        </form>
                        <form method="post"
                              th:action="@{/admin/gatekeeping/{id}/delete(id=${gk.id})}"
                              class="d-inline"
                              onsubmit="return confirm('Delete this gatekeeping cycle?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1" aria-labelledby="createModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createModalLabel">New Gatekeeping Cycle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form method="post" th:action="@{/admin/gatekeeping}">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" class="form-control" id="date" name="date" required/>
                        </div>
                        <div class="mb-3">
                            <label for="submissionDeadline" class="form-label">Submission Deadline</label>
                            <input type="date" class="form-control" id="submissionDeadline" name="submissionDeadline" required/>
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="4"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Modal (populated via htmx) -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Gatekeeping Cycle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="editModalBody">
                    <!-- Loaded via htmx -->
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts-extra">
    <script>
        new DataTable('#gatekeepingTable', window.defaultDataTableConfig);
    </script>
</th:block>

<div th:fragment="editForm">
    <form method="post" th:action="@{/admin/gatekeeping/{id}/update(id=${gatekeeping.id})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
            <label for="editDate" class="form-label">Date</label>
            <input type="date" class="form-control" id="editDate" name="date"
                   th:value="${gatekeeping.date}" required/>
        </div>
        <div class="mb-3">
            <label for="editSubmissionDeadline" class="form-label">Submission Deadline</label>
            <input type="date" class="form-control" id="editSubmissionDeadline" name="submissionDeadline"
                   th:value="${gatekeeping.submissionDeadline}" required/>
        </div>
        <div class="mb-3">
            <label for="editNotes" class="form-label">Notes</label>
            <textarea class="form-control" id="editNotes" name="notes" rows="4"
                      th:text="${gatekeeping.notes}"></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
        </div>
    </form>
</div>

</body>
</html>
